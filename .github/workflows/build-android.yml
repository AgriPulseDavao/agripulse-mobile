name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.29.0'

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Accept Android SDK licenses and install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons from AgriPulse PNGs
        run: dart run flutter_launcher_icons || true

      - name: Build debug APK
        run: |
          flutter build apk --debug             --dart-define=thingsboardApiEndpoint=https://thingsboard.cloud             --dart-define=androidApplicationName=AgriPulse             --dart-define=androidApplicationId=ph.agripulse.davao             --dart-define=thingsboardOAuth2CallbackUrlScheme=ph.agripulse.davao.auth             --dart-define=appLinksUrlHost=thingsboard.cloud

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agripulse-debug-apk
          path: build/app/outputs/flutter-apk/AgriPulse-debug-1.0+1.apk
          retention-days: 30
